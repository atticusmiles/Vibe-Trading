name: CI

on:
  push:
    branches: [develop, release, main]
    tags: ["v*"]
  pull_request:
    branches: [develop, release, main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/vibe-trading

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check agent/ || true

      - name: Syntax check
        run: |
          cd agent
          python -m py_compile cli.py
          python -m py_compile api_server.py
          python -m py_compile mcp_server.py
          python -m py_compile src/agent/loop.py
          python -m py_compile src/tools/__init__.py
          python -m py_compile backtest/runner.py

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --ignore=agent/tests/e2e_backtest --tb=short -q

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend build
        run: |
          cd frontend
          npm ci
          npm run build

  docker-build:
    needs: [lint, test, frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/release')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          SHA_SHORT=$(git rev-parse --short=7 HEAD)
          if [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop-${SHA_SHORT}" >> $GITHUB_OUTPUT
          else
            echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:release-${SHA_SHORT},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:release-latest" >> $GITHUB_OUTPUT
          fi
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-uat:
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/release'
    environment: UAT
    timeout-minutes: 10
    steps:
      - name: Compute image tag
        id: tag
        run: echo "value=release-$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GH_PAT: ${{ secrets.GHCR_PAT }}
          GHCR_USER: ${{ github.actor }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          DEPLOY_TAG: ${{ steps.tag.outputs.value }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        with:
          host: ${{ vars.HOST }}
          username: ${{ vars.SSH_USER || 'deploy' }}
          password: ${{ secrets.SSH_PASSWORD }}
          envs: GH_PAT,GHCR_USER,IMAGE,DEPLOY_TAG,LLM_API_KEY,TUSHARE_TOKEN,ENCRYPTION_KEY,JWT_SECRET
          script: |
            set -euo pipefail

            # Stop old deployments
            for old_dir in /opt/vibe-trading "$HOME/vibe-trading"; do
              if [ -f "$old_dir/docker-compose.yml" ]; then
                cd "$old_dir" && docker compose down 2>/dev/null || true
              fi
            done

            COMPOSE_DIR="/opt/1panel/docker/compose/vibetrading"
            sudo mkdir -p "$COMPOSE_DIR"
            sudo chown -R $(whoami) "$COMPOSE_DIR"
            cd "$COMPOSE_DIR"

            # Write docker-compose.yml
            cat > docker-compose.yml <<DCEOF
            services:
              vibe-trading:
                image: $IMAGE:\${TAG:-develop}
                ports:
                  - "127.0.0.1:8899:8899"
                environment:
                  - DATA_DIR=/data
                  - VIBE_TRADING_TRUST_DOCKER_LOOPBACK=1
                env_file:
                  - .env
                volumes:
                  - vibe-data:/data
                restart: unless-stopped
            volumes:
              vibe-data:
            DCEOF

            # Fetch environment variables from GitHub API
            REPO_API="https://api.github.com/repos/atticusmiles/vibe-trading"
            HTTP_CODE=$(curl -sL -w "%{http_code}" -o /tmp/vars.json \
              -H "Authorization: token $GH_PAT" \
              -H "Accept: application/vnd.github.v3+json" \
              "$REPO_API/environments/UAT/variables?per_page=100")
            if [ "$HTTP_CODE" -ne 200 ]; then
              echo "ERROR: GitHub API returned HTTP $HTTP_CODE"
              cat /tmp/vars.json
              exit 1
            fi
            python3 -c "
            import sys, json
            data = json.load(open('/tmp/vars.json'))
            skip = {'HOST', 'SSH_USER', 'DEPLOY_PATH'}
            for v in data.get('variables', []):
                if v['name'] not in skip:
                    print(f\"{v['name']}={v['value']}\")
            " > .env

            # Append secrets (API cannot read values, must be passed as env vars)
            {
              echo "LLM_API_KEY=$LLM_API_KEY"
              echo "TUSHARE_TOKEN=$TUSHARE_TOKEN"
              echo "ENCRYPTION_KEY=$ENCRYPTION_KEY"
              echo "JWT_SECRET=$JWT_SECRET"
            } >> .env

            # Remove empty or TODO values
            sed -i '/=$/d; /=TODO$/d' .env
            chmod 600 .env
            echo "--- .env keys ---"
            sed 's/=.*/=***/' .env

            # Login to GHCR, pull and restart
            echo "$GH_PAT" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            export TAG=$DEPLOY_TAG
            docker compose pull
            docker compose up -d --force-recreate

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.HOST }}
          username: ${{ vars.SSH_USER || 'deploy' }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            for i in $(seq 1 12); do
              if curl -sf http://127.0.0.1:8899/health > /dev/null 2>&1; then
                echo "Health check passed"
                exit 0
              fi
              echo "Waiting for health check... ($i/12)"
              sleep 5
            done
            echo "ERROR: Health check failed after 60s"
            exit 1

  e2e-uat:
    needs: deploy-uat
    runs-on: ubuntu-latest
    environment: UAT
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        run: cd e2e && npm ci && npx playwright install --with-deps chromium

      - name: Run E2E tests via SSH tunnel
        env:
          E2E_BASE_URL: http://127.0.0.1:8899
          SSHPASS: ${{ secrets.SSH_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass
          sshpass -e ssh -f -N -L 8899:127.0.0.1:8899 \
            -o StrictHostKeyChecking=no \
            ${{ vars.SSH_USER || 'deploy' }}@${{ vars.HOST }} &
          sleep 2
          cd e2e && npx playwright test --reporter=github

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-uat
          path: e2e/playwright-report/

  retag-release:
    needs: [lint, test, frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Find release image and retag
        env:
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          # release-latest is always updated by docker-build on the release branch
          echo "Retagging $IMAGE:release-latest -> $IMAGE:$VERSION_TAG"
          crane tag "$IMAGE:release-latest" "$VERSION_TAG"
