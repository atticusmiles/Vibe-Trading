name: CI

on:
  push:
    branches: [develop, release, main]
    tags: ["v*"]
  pull_request:
    branches: [develop, release, main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/vibe-trading

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check agent/ || true

      - name: Syntax check
        run: |
          cd agent
          python -m py_compile cli.py
          python -m py_compile api_server.py
          python -m py_compile mcp_server.py
          python -m py_compile src/agent/loop.py
          python -m py_compile src/tools/__init__.py
          python -m py_compile backtest/runner.py

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --ignore=agent/tests/e2e_backtest --tb=short -q

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend build
        run: |
          cd frontend
          npm ci
          npm run build

  docker-build:
    needs: [lint, test, frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/release')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          SHA_SHORT=$(git rev-parse --short=7 HEAD)
          if [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:develop-${SHA_SHORT}" >> $GITHUB_OUTPUT
          else
            echo "tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:release-${SHA_SHORT}" >> $GITHUB_OUTPUT
          fi
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-uat:
    needs: docker-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/release'
    environment: UAT
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Find release image tag
        id: image
        run: |
          SHA_SHORT=$(git rev-parse --short=7 HEAD)
          echo "tag=release-${SHA_SHORT}" >> $GITHUB_OUTPUT
          echo "Deploying image tag: release-${SHA_SHORT}"

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.UAT_HOST }}
          username: ${{ secrets.UAT_SSH_USER || 'deploy' }}
          key: ${{ secrets.UAT_SSH_KEY }}
          source: "docker-compose.yml"
          target: ${{ secrets.UAT_DEPLOY_PATH || '/opt/vibe-trading' }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.UAT_HOST }}
          username: ${{ secrets.UAT_SSH_USER || 'deploy' }}
          key: ${{ secrets.UAT_SSH_KEY }}
          envs: ENV_LANGCHAIN_PROVIDER,ENV_LANGCHAIN_MODEL_NAME,ENV_OPENROUTER_API_KEY,ENV_OPENROUTER_BASE_URL,ENV_OPENAI_API_KEY,ENV_OPENAI_BASE_URL,ENV_DEEPSEEK_API_KEY,ENV_DEEPSEEK_BASE_URL,ENV_GEMINI_API_KEY,ENV_GEMINI_BASE_URL,ENV_TUSHARE_TOKEN,ENV_ENCRYPTION_KEY,ENV_JWT_SECRET,ENV_API_AUTH_KEY
          script: |
            cd ${{ secrets.UAT_DEPLOY_PATH || '/opt/vibe-trading' }}
            mkdir -p agent
            cat > agent/.env <<'ENVEOF'
            LANGCHAIN_PROVIDER=${ENV_LANGCHAIN_PROVIDER}
            LANGCHAIN_MODEL_NAME=${ENV_LANGCHAIN_MODEL_NAME}
            OPENROUTER_API_KEY=${ENV_OPENROUTER_API_KEY}
            OPENROUTER_BASE_URL=${ENV_OPENROUTER_BASE_URL}
            OPENAI_API_KEY=${ENV_OPENAI_API_KEY}
            OPENAI_BASE_URL=${ENV_OPENAI_BASE_URL}
            DEEPSEEK_API_KEY=${ENV_DEEPSEEK_API_KEY}
            DEEPSEEK_BASE_URL=${ENV_DEEPSEEK_BASE_URL}
            GEMINI_API_KEY=${ENV_GEMINI_API_KEY}
            GEMINI_BASE_URL=${ENV_GEMINI_BASE_URL}
            TUSHARE_TOKEN=${ENV_TUSHARE_TOKEN}
            ENCRYPTION_KEY=${ENV_ENCRYPTION_KEY}
            JWT_SECRET=${ENV_JWT_SECRET}
            API_AUTH_KEY=${ENV_API_AUTH_KEY}
            ENVEOF
            export TAG=${{ steps.image.outputs.tag }}
            docker compose pull
            docker compose up -d --force-recreate
        env:
          ENV_LANGCHAIN_PROVIDER: ${{ secrets.LANGCHAIN_PROVIDER }}
          ENV_LANGCHAIN_MODEL_NAME: ${{ secrets.LANGCHAIN_MODEL_NAME }}
          ENV_OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ENV_OPENROUTER_BASE_URL: ${{ secrets.OPENROUTER_BASE_URL }}
          ENV_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ENV_OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          ENV_DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ENV_DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          ENV_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ENV_GEMINI_BASE_URL: ${{ secrets.GEMINI_BASE_URL }}
          ENV_TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          ENV_ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          ENV_JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENV_API_AUTH_KEY: ${{ secrets.API_AUTH_KEY }}

      - name: Health check
        run: |
          for i in $(seq 1 12); do
            if curl -sf http://${{ secrets.UAT_HOST }}:8899/health > /dev/null 2>&1; then
              echo "Health check passed"
              exit 0
            fi
            echo "Waiting for health check... ($i/12)"
            sleep 5
          done
          echo "ERROR: Health check failed after 60s"
          exit 1

  retag-release:
    needs: [lint, test, frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Find release image and retag
        env:
          VERSION_TAG: ${{ github.ref_name }}
        run: |
          # Find the most recent release-sha-* tag in the registry
          # by looking at the merge commit on main's ancestry
          # We retag the latest release-sha image as the version tag
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          # Get the list of tags and find the latest release- tag
          LATEST_RELEASE_TAG=$(crane ls "$IMAGE" 2>/dev/null | grep '^release-' | sort -r | head -1)
          if [ -z "$LATEST_RELEASE_TAG" ]; then
            echo "ERROR: No release-* image found in registry"
            exit 1
          fi
          echo "Retagging $IMAGE:$LATEST_RELEASE_TAG -> $IMAGE:$VERSION_TAG"
          crane tag "$IMAGE:$LATEST_RELEASE_TAG" "$VERSION_TAG"
