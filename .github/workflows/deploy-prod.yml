name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. v0.1.8)"
        required: true
        type: string
      confirm:
        description: "Confirm production deployment"
        required: true
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/vibe-trading

jobs:
  deploy:
    if: ${{ inputs.confirm }}
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Verify image exists
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          docker manifest inspect "$IMAGE:${{ inputs.image_tag }}" > /dev/null 2>&1 || {
            echo "ERROR: Image $IMAGE:${{ inputs.image_tag }} not found"
            exit 1
          }
          echo "Image verified: $IMAGE:${{ inputs.image_tag }}"

      - name: Build .env
        id: dotenv
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          # Auto-fetch all environment variables via API
          gh api "repos/$REPO/environments/Production/variables" \
            --paginate --jq '.variables[] | "\(.name)=\(.value)"' \
            | grep -v -E '^(HOST|SSH_USER|DEPLOY_PATH)=' \
            > /tmp/.env
          # Append secrets (API cannot read values)
          {
            echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}"
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}"
            echo "DEEPSEEK_API_KEY=${{ secrets.DEEPSEEK_API_KEY }}"
            echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}"
            echo "ZAI_API_KEY=${{ secrets.ZAI_API_KEY }}"
            echo "ZHIPU_API_KEY=${{ secrets.ZHIPU_API_KEY }}"
            echo "TUSHARE_TOKEN=${{ secrets.TUSHARE_TOKEN }}"
            echo "ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}"
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
            echo "API_AUTH_KEY=${{ secrets.API_AUTH_KEY }}"
          } >> /tmp/.env
          # Remove empty or TODO values
          sed -i '/=$/d; /=TODO$/d' /tmp/.env
          DOTENV_B64=$(base64 -w0 /tmp/.env)
          echo "dotenv_b64=$DOTENV_B64" >> $GITHUB_OUTPUT
          echo "--- .env keys ---"
          sed 's/=.*/=***/' /tmp/.env

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.HOST }}
          username: ${{ vars.SSH_USER || 'deploy' }}
          password: ${{ secrets.SSH_PASSWORD }}
          envs: DOTENV_B64,DEPLOY_TAG
          script: |
            # Stop old deployments
            for old_dir in /opt/vibe-trading "$HOME/vibe-trading"; do
              if [ -f "$old_dir/docker-compose.yml" ]; then
                cd "$old_dir" && docker compose down 2>/dev/null || true
              fi
            done

            COMPOSE_DIR="/opt/1panel/docker/compose/vibetrading"
            sudo mkdir -p "$COMPOSE_DIR"
            sudo chown -R $(whoami) "$COMPOSE_DIR"
            cd "$COMPOSE_DIR"

            cat > docker-compose.yml <<'DCEOF'
            services:
              vibe-trading:
                image: ghcr.io/atticusmiles/vibe-trading:${TAG:-develop}
                ports:
                  - "127.0.0.1:8899:8899"
                environment:
                  - DATA_DIR=/data
                  - VIBE_TRADING_TRUST_DOCKER_LOOPBACK=1
                env_file:
                  - .env
                volumes:
                  - vibe-data:/data
                restart: unless-stopped
            volumes:
              vibe-data:
            DCEOF

            echo "$DOTENV_B64" | base64 -d > .env
            echo "--- .env ---"
            sed 's/=.*/=***/' .env

            export TAG=$DEPLOY_TAG
            docker compose pull
            docker compose up -d --force-recreate
        env:
          DOTENV_B64: ${{ steps.dotenv.outputs.dotenv_b64 }}
          DEPLOY_TAG: ${{ inputs.image_tag }}

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.HOST }}
          username: ${{ vars.SSH_USER || 'deploy' }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            for i in $(seq 1 12); do
              if curl -sf http://127.0.0.1:8899/health > /dev/null 2>&1; then
                echo "Health check passed"
                exit 0
              fi
              echo "Waiting for health check... ($i/12)"
              sleep 5
            done
            echo "ERROR: Health check failed after 60s"
            exit 1

      - name: Create GitHub Release
        if: startsWith(inputs.image_tag, 'v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.image_tag }}" \
            --title "${{ inputs.image_tag }}" \
            --notes "Automated release from image tag \`${{ inputs.image_tag }}\`."
            --repo "${{ github.repository }}"
