name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. v0.1.8)"
        required: true
        type: string
      confirm:
        description: "Confirm production deployment"
        required: true
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/vibe-trading

jobs:
  deploy:
    if: ${{ inputs.confirm }}
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Verify image exists
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          docker manifest inspect "$IMAGE:${{ inputs.image_tag }}" > /dev/null 2>&1 || {
            echo "ERROR: Image $IMAGE:${{ inputs.image_tag }} not found"
            exit 1
          }
          echo "Image verified: $IMAGE:${{ inputs.image_tag }}"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GH_PAT: ${{ secrets.GHCR_PAT }}
          GHCR_USER: ${{ github.actor }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          DEPLOY_TAG: ${{ inputs.image_tag }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        with:
          host: ${{ vars.HOST }}
          username: ${{ vars.SSH_USER || 'deploy' }}
          password: ${{ secrets.SSH_PASSWORD }}
          envs: GH_PAT,GHCR_USER,IMAGE,DEPLOY_TAG,LLM_API_KEY,TUSHARE_TOKEN,ENCRYPTION_KEY,JWT_SECRET
          script: |
            set -euo pipefail

            # Stop old deployments
            for old_dir in /opt/vibe-trading "$HOME/vibe-trading"; do
              if [ -f "$old_dir/docker-compose.yml" ]; then
                cd "$old_dir" && docker compose down 2>/dev/null || true
              fi
            done

            COMPOSE_DIR="/opt/1panel/docker/compose/vibetrading"
            sudo mkdir -p "$COMPOSE_DIR"
            sudo chown -R $(whoami) "$COMPOSE_DIR"
            cd "$COMPOSE_DIR"

            # Prepare data directory
            mkdir -p "$COMPOSE_DIR/data"

            # Write docker-compose.yml
            cat > docker-compose.yml <<DCEOF
            services:
              vibe-trading:
                image: $IMAGE:\${TAG:-develop}
                ports:
                  - "127.0.0.1:8899:8899"
                environment:
                  - DATA_DIR=/data
                  - VIBE_TRADING_TRUST_DOCKER_LOOPBACK=1
                env_file:
                  - .env
                volumes:
                  - ./data:/data
                restart: unless-stopped
            DCEOF

            # Fetch environment variables from GitHub API
            REPO_API="https://api.github.com/repos/atticusmiles/vibe-trading"
            HTTP_CODE=$(curl -sL -w "%{http_code}" -o /tmp/vars.json \
              -H "Authorization: token $GH_PAT" \
              -H "Accept: application/vnd.github.v3+json" \
              "$REPO_API/environments/Production/variables?per_page=100")
            if [ "$HTTP_CODE" -ne 200 ]; then
              echo "ERROR: GitHub API returned HTTP $HTTP_CODE"
              cat /tmp/vars.json
              exit 1
            fi
            python3 -c "
            import sys, json
            data = json.load(open('/tmp/vars.json'))
            skip = {'HOST', 'SSH_USER', 'DEPLOY_PATH'}
            for v in data.get('variables', []):
                if v['name'] not in skip:
                    print(f\"{v['name']}={v['value']}\")
            " > .env

            # Append secrets (API cannot read values, must be passed as env vars)
            {
              echo "LLM_API_KEY=$LLM_API_KEY"
              echo "TUSHARE_TOKEN=$TUSHARE_TOKEN"
              echo "ENCRYPTION_KEY=$ENCRYPTION_KEY"
              echo "JWT_SECRET=$JWT_SECRET"
            } >> .env

            # Remove empty or TODO values
            sed -i '/=$/d; /=TODO$/d' .env
            chmod 600 .env
            echo "--- .env keys ---"
            sed 's/=.*/=***/' .env

            # Login to GHCR, pull and restart
            echo "$GH_PAT" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            export TAG=$DEPLOY_TAG
            docker compose pull
            docker compose up -d --force-recreate

      - name: Health check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.HOST }}
          username: ${{ vars.SSH_USER || 'deploy' }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            for i in $(seq 1 12); do
              if curl -sf http://127.0.0.1:8899/health > /dev/null 2>&1; then
                echo "Health check passed"
                exit 0
              fi
              echo "Waiting for health check... ($i/12)"
              sleep 5
            done
            echo "ERROR: Health check failed after 60s"
            exit 1

      - name: Create GitHub Release
        if: startsWith(inputs.image_tag, 'v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.image_tag }}" \
            --title "${{ inputs.image_tag }}" \
            --notes "Automated release from image tag \`${{ inputs.image_tag }}\`."
            --repo "${{ github.repository }}"
