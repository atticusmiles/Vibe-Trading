name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. v0.1.8)"
        required: true
        type: string
      confirm:
        description: "Confirm production deployment"
        required: true
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/vibe-trading

jobs:
  deploy:
    if: ${{ inputs.confirm }}
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Verify image exists
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          docker manifest inspect "$IMAGE:${{ inputs.image_tag }}" > /dev/null 2>&1 || {
            echo "ERROR: Image $IMAGE:${{ inputs.image_tag }} not found"
            exit 1
          }
          echo "Image verified: $IMAGE:${{ inputs.image_tag }}"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.HOST }}
          username: ${{ vars.SSH_USER || 'deploy' }}
          password: ${{ secrets.SSH_PASSWORD }}
          envs: ENV_LANGCHAIN_PROVIDER,ENV_LANGCHAIN_MODEL_NAME,ENV_OPENROUTER_API_KEY,ENV_OPENROUTER_BASE_URL,ENV_OPENAI_API_KEY,ENV_OPENAI_BASE_URL,ENV_DEEPSEEK_API_KEY,ENV_DEEPSEEK_BASE_URL,ENV_GEMINI_API_KEY,ENV_GEMINI_BASE_URL,ENV_ZAI_API_KEY,ENV_ZAI_BASE_URL,ENV_ZHIPU_API_KEY,ENV_ZHIPU_BASE_URL,ENV_TUSHARE_TOKEN,ENV_ENCRYPTION_KEY,ENV_JWT_SECRET,ENV_API_AUTH_KEY
          script: |
            cd ${{ vars.DEPLOY_PATH || '/opt/vibe-trading' }}
            mkdir -p agent
            cat > docker-compose.yml <<'DCEOF'
            services:
              vibe-trading:
                image: ghcr.io/atticusmiles/vibe-trading:${TAG:-develop}
                ports:
                  - "127.0.0.1:8899:8899"
                environment:
                  - DATA_DIR=/data
                  - VIBE_TRADING_TRUST_DOCKER_LOOPBACK=1
                env_file:
                  - agent/.env
                volumes:
                  - vibe-data:/data
                restart: unless-stopped
            volumes:
              vibe-data:
            DCEOF
            cat > agent/.env <<'ENVEOF'
            LANGCHAIN_PROVIDER=${ENV_LANGCHAIN_PROVIDER}
            LANGCHAIN_MODEL_NAME=${ENV_LANGCHAIN_MODEL_NAME}
            OPENROUTER_API_KEY=${ENV_OPENROUTER_API_KEY}
            OPENROUTER_BASE_URL=${ENV_OPENROUTER_BASE_URL}
            OPENAI_API_KEY=${ENV_OPENAI_API_KEY}
            OPENAI_BASE_URL=${ENV_OPENAI_BASE_URL}
            DEEPSEEK_API_KEY=${ENV_DEEPSEEK_API_KEY}
            DEEPSEEK_BASE_URL=${ENV_DEEPSEEK_BASE_URL}
            GEMINI_API_KEY=${ENV_GEMINI_API_KEY}
            GEMINI_BASE_URL=${ENV_GEMINI_BASE_URL}
            ZAI_API_KEY=${ENV_ZAI_API_KEY}
            ZAI_BASE_URL=${ENV_ZAI_BASE_URL}
            ZHIPU_API_KEY=${ENV_ZHIPU_API_KEY}
            ZHIPU_BASE_URL=${ENV_ZHIPU_BASE_URL}
            TUSHARE_TOKEN=${ENV_TUSHARE_TOKEN}
            ENCRYPTION_KEY=${ENV_ENCRYPTION_KEY}
            JWT_SECRET=${ENV_JWT_SECRET}
            API_AUTH_KEY=${ENV_API_AUTH_KEY}
            ENVEOF
            export TAG=${{ inputs.image_tag }}
            docker compose pull
            docker compose up -d --force-recreate
        env:
          ENV_LANGCHAIN_PROVIDER: ${{ vars.LANGCHAIN_PROVIDER }}
          ENV_LANGCHAIN_MODEL_NAME: ${{ vars.LANGCHAIN_MODEL_NAME }}
          ENV_OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ENV_OPENROUTER_BASE_URL: ${{ vars.OPENROUTER_BASE_URL }}
          ENV_OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ENV_OPENAI_BASE_URL: ${{ vars.OPENAI_BASE_URL }}
          ENV_DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          ENV_DEEPSEEK_BASE_URL: ${{ vars.DEEPSEEK_BASE_URL }}
          ENV_GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ENV_GEMINI_BASE_URL: ${{ vars.GEMINI_BASE_URL }}
          ENV_ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          ENV_ZAI_BASE_URL: ${{ vars.ZAI_BASE_URL }}
          ENV_ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          ENV_ZHIPU_BASE_URL: ${{ vars.ZHIPU_BASE_URL }}
          ENV_TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          ENV_ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          ENV_JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENV_API_AUTH_KEY: ${{ secrets.API_AUTH_KEY }}

      - name: Health check
        run: |
          for i in $(seq 1 12); do
            if curl -sf http://${{ vars.HOST }}:8899/health > /dev/null 2>&1; then
              echo "Health check passed"
              exit 0
            fi
            echo "Waiting for health check... ($i/12)"
            sleep 5
          done
          echo "ERROR: Health check failed after 60s"
          exit 1

      - name: Create GitHub Release
        if: startsWith(inputs.image_tag, 'v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.image_tag }}" \
            --title "${{ inputs.image_tag }}" \
            --notes "Automated release from image tag \`${{ inputs.image_tag }}\`."
            --repo "${{ github.repository }}"
