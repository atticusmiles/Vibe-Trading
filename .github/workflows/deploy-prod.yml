name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. v0.1.8)"
        required: true
        type: string
      confirm:
        description: "Confirm production deployment"
        required: true
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/vibe-trading

jobs:
  deploy:
    if: ${{ inputs.confirm }}
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Verify image exists
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          docker manifest inspect "$IMAGE:${{ inputs.image_tag }}" > /dev/null 2>&1 || {
            echo "ERROR: Image $IMAGE:${{ inputs.image_tag }} not found"
            exit 1
          }
          echo "Image verified: $IMAGE:${{ inputs.image_tag }}"

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.HOST }}
          username: ${{ vars.SSH_USER || 'deploy' }}
          password: ${{ secrets.SSH_PASSWORD }}
          source: "docker-compose.yml"
          target: ${{ vars.DEPLOY_PATH || '/opt/vibe-trading' }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ vars.HOST }}
          username: ${{ vars.SSH_USER || 'deploy' }}
          password: ${{ secrets.SSH_PASSWORD }}
          envs: ENV_LANGCHAIN_PROVIDER,ENV_LANGCHAIN_MODEL_NAME,ENV_LLM_API_KEY,ENV_LLM_BASE_URL,ENV_TUSHARE_TOKEN,ENV_ENCRYPTION_KEY,ENV_JWT_SECRET,ENV_API_AUTH_KEY
          script: |
            cd ${{ vars.DEPLOY_PATH || '/opt/vibe-trading' }}
            mkdir -p agent
            case "$ENV_LANGCHAIN_PROVIDER" in
              openrouter) KEY_NAME=OPENROUTER_API_KEY; URL_NAME=OPENROUTER_BASE_URL ;;
              openai)     KEY_NAME=OPENAI_API_KEY;     URL_NAME=OPENAI_BASE_URL ;;
              deepseek)   KEY_NAME=DEEPSEEK_API_KEY;   URL_NAME=DEEPSEEK_BASE_URL ;;
              gemini)     KEY_NAME=GEMINI_API_KEY;     URL_NAME=GEMINI_BASE_URL ;;
              dashscope)  KEY_NAME=DASHSCOPE_API_KEY;  URL_NAME=DASHSCOPE_BASE_URL ;;
              zhipu)      KEY_NAME=ZHIPU_API_KEY;      URL_NAME=ZHIPU_BASE_URL ;;
              moonshot)   KEY_NAME=MOONSHOT_API_KEY;   URL_NAME=MOONSHOT_BASE_URL ;;
              minimax)    KEY_NAME=MINIMAX_API_KEY;    URL_NAME=MINIMAX_BASE_URL ;;
              mimo)       KEY_NAME=MIMO_API_KEY;       URL_NAME=MIMO_BASE_URL ;;
              zai)        KEY_NAME=ZAI_API_KEY;        URL_NAME=ZAI_BASE_URL ;;
              groq)       KEY_NAME=GROQ_API_KEY;       URL_NAME=GROQ_BASE_URL ;;
              *)          KEY_NAME=LLM_API_KEY;        URL_NAME=LLM_BASE_URL ;;
            esac
            cat > agent/.env <<ENVEOF
            LANGCHAIN_PROVIDER=${ENV_LANGCHAIN_PROVIDER}
            LANGCHAIN_MODEL_NAME=${ENV_LANGCHAIN_MODEL_NAME}
            ${KEY_NAME}=${ENV_LLM_API_KEY}
            ${URL_NAME}=${ENV_LLM_BASE_URL}
            TUSHARE_TOKEN=${ENV_TUSHARE_TOKEN}
            ENCRYPTION_KEY=${ENV_ENCRYPTION_KEY}
            JWT_SECRET=${ENV_JWT_SECRET}
            API_AUTH_KEY=${ENV_API_AUTH_KEY}
            ENVEOF
            export TAG=${{ inputs.image_tag }}
            docker compose pull
            docker compose up -d --force-recreate
        env:
          ENV_LANGCHAIN_PROVIDER: ${{ vars.LANGCHAIN_PROVIDER }}
          ENV_LANGCHAIN_MODEL_NAME: ${{ vars.LANGCHAIN_MODEL_NAME }}
          ENV_LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          ENV_LLM_BASE_URL: ${{ vars.LLM_BASE_URL }}
          ENV_TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
          ENV_ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          ENV_JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ENV_API_AUTH_KEY: ${{ secrets.API_AUTH_KEY }}

      - name: Health check
        run: |
          for i in $(seq 1 12); do
            if curl -sf http://${{ vars.HOST }}:8899/health > /dev/null 2>&1; then
              echo "Health check passed"
              exit 0
            fi
            echo "Waiting for health check... ($i/12)"
            sleep 5
          done
          echo "ERROR: Health check failed after 60s"
          exit 1

      - name: Create GitHub Release
        if: startsWith(inputs.image_tag, 'v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.image_tag }}" \
            --title "${{ inputs.image_tag }}" \
            --notes "Automated release from image tag \`${{ inputs.image_tag }}\`."
            --repo "${{ github.repository }}"
