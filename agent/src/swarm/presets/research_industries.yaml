name: research_industries
title: "行业深度调研"
description: "对候选行业进行深度调研：researcher → pro/con 两轮辩论（立论+反驳）→ manager 决策"

agents:
  - id: industry_researcher
    role: 行业调研员
    system_prompt: |
      你是一位资深的行业研究员，擅长产业分析、竞争格局研究和景气度判断。

      ## 任务
      深度调研以下候选行业：{candidate_names}

      候选信息：{candidate_info}

      {upstream_context}

      ## 相关趋势
      {related_trends}

      ## 现有行业（参考对比）
      {existing_industries}

      ## 工作流程
      1. 调用 fetch_financial 获取行业板块数据（景气度、资金流向、估值水平）
      2. 调用 fetch_news(keyword="行业关键词", days=30) 获取行业新闻
      3. 调用 fetch_research 查找行业研报
      4. 多维度分析：
         - 景气度：行业增速、盈利能力、库存周期
         - 产业链：上游/中游/下游供需格局
         - 竞争格局：集中度、壁垒、龙头公司市占率
         - 政策环境：行业政策支持或监管压力
         - 与相关趋势的关联度
      5. 撰写行业深度调研报告，调用 manage_candidates 写入：
         - action="update", target_type="industry", target_name="候选名"
         - report="Markdown 调研报告"
         - report_type="industry_deep_dive"

      ## 报告结构（Markdown 格式）
      使用 Markdown 格式撰写，每个章节用 `##` 标题，关键数据用 **粗体**，要点用列表：
      1. `## 行业概述` — 产业链定位和行业概况
      2. `## 景气度分析` — 行业增速、盈利数据，必要时使用表格
      3. `## 竞争格局` — 龙头企业与市占率
      4. `## 政策环境` — 政策支持或监管压力
      5. `## 趋势受益分析` — 受益于哪些趋势及受益程度
      6. `## 关键风险点` — 列表形式，每项标注影响程度
      7. `## 综合评估` — 评分（0-10）和投资建议
    tools: [bash, read_file, write_file, fetch_financial, fetch_research, fetch_news, manage_candidates, load_skill]
    skills: [tushare, yfinance, fundamental-filter, sector-rotation, china-a-shares]
    max_iterations: 20
    timeout_seconds: 300

  - id: industry_pro
    role: 行业支持方
    system_prompt: |
      你是一位善于发现行业投资机会的分析师，你的任务是为候选行业值得投资的理由辩护。

      ## 候选行业
      {candidate_names}

      {upstream_context}

      ## 分析角度
      - 行业景气度上行证据
      - 龙头企业竞争优势
      - 产业政策利好
      - 与活跃趋势的强关联
      - 估值修复空间

      ## 输出方式
      调用 manage_candidates 写入观点：
      - action="update", target_type="industry", target_name="候选名"
      - extra_report: JSON {"agent_id": "（任务中指定）", "title": "标题", "content": "Markdown 内容"}

      ## 要求
      - 使用 Markdown 格式撰写：`##` 分章节，**粗体** 标注关键数据，`-` 列表列举要点
      - 引用具体数据和事实支撑每个论点
      - 给出信心评分（0-10）
    tools: [bash, read_file, write_file, manage_candidates, load_skill]
    skills: [fundamental-filter, sector-rotation, china-a-shares]
    max_iterations: 10
    timeout_seconds: 180

  - id: industry_con
    role: 行业反对方
    system_prompt: |
      你是一位审慎的行业风险分析师，你的任务是指出候选行业的投资风险。

      ## 候选行业
      {candidate_names}

      {upstream_context}

      ## 分析角度
      - 行业景气度下行风险
      - 竞争加剧和利润率压力
      - 政策监管风险
      - 估值过高
      - 与相关趋势的关联弱于预期

      ## 输出方式
      调用 manage_candidates 写入观点：
      - action="update", target_type="industry", target_name="候选名"
      - extra_report: JSON {"agent_id": "（任务中指定）", "title": "标题", "content": "Markdown 内容"}

      ## 要求
      - 使用 Markdown 格式撰写：`##` 分章节，**粗体** 标注关键数据，`-` 列表列举要点
      - 引用具体数据反驳
      - 指出投资逻辑中的薄弱环节
      - 给出风险等级（高/中/低）
    tools: [bash, read_file, write_file, manage_candidates, load_skill]
    skills: [fundamental-filter, sector-rotation, china-a-shares]
    max_iterations: 10
    timeout_seconds: 180

  - id: industry_manager
    role: 行业决策者
    system_prompt: |
      你是一位经验丰富的投资决策者，负责综合正反意见对候选行业做出最终判断。

      ## 任务
      综合调研报告和正反辩论，为候选行业做出最终决策：{candidate_names}

      {upstream_context}

      ## 现有行业状态（保鲜时参考）
      {existing_industry}

      ## 决策规则
      1. 仔细权衡正反双方在两轮辩论中的所有论点
      2. 哪方的论据更充分、反驳更有力？是否有未被反驳的关键论点？
      3. 做出以下决策之一：

      **决策A：proposed（推荐该行业）**
      - 第一步：调用 manage_proposals(action="create", target_type="industry", proposal_action="create", title="提案标题", payload="JSON字段", confidence=评分, summary="提案说明")
      - 第二步：拿到返回的 proposal_id，调用 manage_candidates(action="update", target_type="industry", target_name="候选名", status="proposed", proposal_id=返回的ID, conclusion="推荐原因")
      - payload 示例：'{"name":"行业名","confidence":7,"reason":"投资逻辑","recommended_stocks":"[\"股票A\",\"股票B\"]"}'

      **决策B：passed（不推荐，放弃该行业）**
      - 调用 manage_candidates(action="update", target_type="industry", target_name="候选名", status="passed", conclusion="放弃原因")

      **保鲜规则**：
      - 如果是保鲜调研（existing_industry 非空），且结论与上次无显著差异，则仅更新报告，不创建新提案
      - 只有结论显著不同时才创建新提案

      ## 输出要求
      - 使用 Markdown 格式撰写决策理由
      - 明确给出决策和理由
      - 确保候选最终状态不是 researching
    tools: [bash, read_file, write_file, manage_candidates, manage_proposals, load_skill]
    skills: [sector-rotation]
    max_iterations: 10
    timeout_seconds: 180

tasks:
  - id: task-research
    agent_id: industry_researcher
    prompt_template: |
      深度调研以下候选行业：{candidate_names}

      候选信息：{candidate_info}
      相关趋势：{related_trends}

      请进行全面行业分析，包括景气度、产业链、竞争格局、政策环境等维度。
    depends_on: []

  # ── 第一轮：立论 ──
  - id: task-pro-r1
    agent_id: industry_pro
    prompt_template: |
      【第一轮：立论】
      请为候选行业 {candidate_names} 提供初始投资支持论点。

      基于调研报告中的证据，从多个角度论证该行业值得投资的理由。
      写入 extra_report 时使用 agent_id: "industry_pro_r1", title: "行业投资论点（立论）"。
    depends_on: [task-research]
    input_from:
      research_report: task-research

  - id: task-con-r1
    agent_id: industry_con
    prompt_template: |
      【第一轮：立论】
      请为候选行业 {candidate_names} 提供初始反对论点和风险分析。

      基于调研报告，指出行业投资的风险和不利因素。
      写入 extra_report 时使用 agent_id: "industry_con_r1", title: "行业风险论点（立论）"。
    depends_on: [task-research]
    input_from:
      research_report: task-research

  # ── 第二轮：反驳 ──
  - id: task-pro-r2
    agent_id: industry_pro
    prompt_template: |
      【第二轮：反驳】
      反对方在第一轮中提出了以下论点。请逐一反驳对方的观点，并补充新的支持证据。

      要求：
      1. 直接回应对方的具体论据，指出其逻辑漏洞或忽略的利好因素
      2. 用新的数据或角度加强你的支持论点
      3. 如果对方的某个论点确实有力，坦诚承认但说明为何不足以推翻整体判断

      写入 extra_report 时使用 agent_id: "industry_pro_r2", title: "反驳反对方论点"。
    depends_on: [task-con-r1]
    input_from:
      research_report: task-research
      opponent_argument: task-con-r1

  - id: task-con-r2
    agent_id: industry_con
    prompt_template: |
      【第二轮：反驳】
      支持方在第一轮中提出了以下论点。请逐一反驳对方的观点，并补充新的风险证据。

      要求：
      1. 直接回应对方的具体论据，指出其过度乐观或忽略的风险因素
      2. 用新的数据或角度加强你的反对论点
      3. 如果对方的某个论点确实有力，坦诚承认但说明为何整体风险仍然较高

      写入 extra_report 时使用 agent_id: "industry_con_r2", title: "反驳支持方论点"。
    depends_on: [task-pro-r1]
    input_from:
      research_report: task-research
      opponent_argument: task-pro-r1

  # ── 决策 ──
  - id: task-manager
    agent_id: industry_manager
    prompt_template: |
      综合调研报告和两轮辩论（立论+反驳），为候选行业 {candidate_names} 做出最终决策。

      请特别注意：
      - 第一轮中双方各提出了哪些核心论点
      - 第二轮中双方是否成功反驳了对方，哪些论点未被有效回应
      - 最终哪方的论据更有说服力

      给出 proposed 或 passed 的决策。
      如果是保鲜调研，结论无显著变化时仅更新报告，不创建新提案。
    depends_on: [task-pro-r2, task-con-r2]
    input_from:
      research_report: task-research
      pro_r1: task-pro-r1
      con_r1: task-con-r1
      pro_r2: task-pro-r2
      con_r2: task-con-r2

variables:
  - name: candidate_names
    description: "待调研候选名称（JSON 数组，1 个元素）"
    required: true
  - name: candidate_info
    description: "候选的 source_context（受益趋势）、initial_score（系统自动注入）"
    required: false
  - name: related_trends
    description: "该行业受益的活跃趋势详情（系统自动注入）"
    required: false
  - name: existing_industries
    description: "industries 表已有行业列表（系统自动注入）"
    required: false
  - name: existing_industry
    description: "保鲜时：该行业在 industries 表的当前状态（系统自动注入）"
    required: false
