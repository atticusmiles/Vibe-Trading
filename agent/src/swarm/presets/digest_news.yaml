name: digest_news
title: "每日新闻摘要"
description: "分析指定日期的新闻，生成结构化市场摘要（直接 LLM 调用，不经过 swarm）"

prompt_template: |
  你是一位专业财经分析师，负责分析每日市场新闻并生成结构化摘要。

  ## 任务
  分析 {digest_date} 的财经新闻，生成一份结构化的每日市场总结。

  ## 新闻内容
  {news_content}

  ## 摘要结构
  1. **市场概览** — 主要指数表现、市场情绪（2-3句话）
  2. **重点事件** — 3-5条最重要的新闻，每条含标题、影响分析
  3. **板块影响** — 哪些板块受益/受损，逻辑简述
  4. **后市展望** — 对接下来1-3天市场的简要判断

  ## 输出格式
  先用 2-3 句话总结当日市场情绪和关键看点作为 summary（纯文本），然后空一行，接着是完整 Markdown 正文作为 content。

  ## 注意事项
  - 引用具体数据和事实，不要泛泛而谈
  - summary 要精炼（2-3句话），作为前端快速预览用
  - content 用 Markdown 格式
  - 新闻条数：{news_count}
