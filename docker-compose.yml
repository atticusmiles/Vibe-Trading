services:
  vibe-trading:
    build: .
    image: ghcr.io/atticusmiles/vibe-trading:${TAG:-develop}
    ports:
      - "127.0.0.1:8899:8899"
    environment:
      - DATA_DIR=/data
      - VIBE_TRADING_TRUST_DOCKER_LOOPBACK=1
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-}
    env_file:
      - .env
    volumes:
      - ./data:/data
    restart: unless-stopped

  # Development frontend (only used with: docker compose --profile frontend up)
  frontend:
    image: node:20
    working_dir: /app
    ports:
      - "5899:5899"
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_URL=http://vibe-trading:8899
    command: sh -c "npm install && npm run dev -- --host --port 5899"
    profiles:
      - frontend
    depends_on:
      vibe-trading:
        condition: service_started
