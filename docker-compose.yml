services:
  vibe-trading:
    image: ghcr.io/atticusmiles/vibe-trading:${TAG:-develop}
    build:
      context: .
    ports:
      - "127.0.0.1:8899:8899"
    environment:
      - VIBE_TRADING_TRUST_DOCKER_LOOPBACK=1
    env_file:
      - .env
    volumes:
      - ./data:/data
    restart: unless-stopped
